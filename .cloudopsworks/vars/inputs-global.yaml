organization_name: "CloudOpsWorrks"
organization_unit: "Blueprints"
environment_name: "actions-runner"
repository_owner: "cloudopsworks" # Required
#
## Default image version is "node:18-alpine" and default run command is npm run start
## modify docker_image and docker_inline parameters to match the proper configuration needed
docker_image: ghcr.io/actions/actions-runner:latest
# Set Snyk processing to true if want to enable, the tool is disabled by default
#snyk:
#  enabled: true
#
# Set Semgrep processing to true if want to enable, the tool is disabled by default
semgrep:
  enabled: true
#
# Set Sonarqube processing to true if want to enable, the tool is disabled by default
#sonarqube:
#  enabled: true
#  fail_on_quality_gate: true
#  sources_path: "/"
#  libraries_path: "**/node_modules/**/*"
#  tests_path: "/"
#  tests_inclusions: "**/test/**/*"
#  tests_libraries: "**/node_modules/**/*"
#  exclusions: "**/node_modules/**/*,"**/test/**/*"
#  extra_exclusions:
#  branch_disabled: true # uncomment only if you are using Community Sonarqube
#
# JIRA Integration for Release Management
#jira:
#  enabled: true | false # Defaults to true, set to false to disable, JIRA_INTEGRATION_ENABLED at organization setting enables or disables globally
#  project_id: "PROJECT ID NUMBER" # Optional, if not set will default to JIRA_INTEGRATION_PROJECT_ID from organization
#  project_key: "PROJECT KEY" # Optional,  if not set will default to JIRA_INTEGRATION_PROJECT_KEY from organization
#
# Set DependencyTrack processing to false if want to disable, the tool is enabled by default
# type: is one of => Library , Application , Container , Framework , Device , Firmware , File , Operating System
#       Default type is Application
#dependencyTrack:
#  enabled: true
#  type: Application
#
# Set Trivy processing to true if want to enable, the tool is disabled by default
#trivy:
#  enabled: true
#
# Dockerfile Inline content that will be merged into the Dockerfile
docker_inline: |
  # Dockerfile content here
  
  WORKDIR /tmp
  
  RUN sudo apt-get update
  RUN sudo apt-get -y install wget gh jq curl zip unzip python3 python3-pip apt-transport-https ca-certificates gnupg lsb-release
  RUN sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq
  RUN curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
  RUN unzip -qo awscliv2.zip
  RUN type -p aws > /dev/null || sudo ./aws/install
  RUN type -p aws > /dev/null && sudo ./aws/install --update
  RUN aws --version
  RUN (type -p az > /dev/null || (echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ jammy main" | sudo tee -a /etc/apt/sources.list.d/azure-cli.list && sudo mkdir -p /etc/apt/keyrings && curl -sLS https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg && sudo chmod go+r /etc/apt/keyrings/microsoft.gpg && sudo apt-get update -y && sudo apt-get install azure-cli -y))
  RUN sudo az extension add --name azure-devops
  RUN sudo az extension add --name aks-preview
  RUN az --version
  RUN (type -p gcloud > /dev/null || (echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list && curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg && sudo apt-get update -y && sudo apt-get install google-cloud-cli -y))
  RUN gcloud --version
  WORKDIR /home/runner
